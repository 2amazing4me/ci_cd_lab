apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: { duration: 60s }
        - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: ghcr.io/2amazing4me/ci_cd_lab@sha256:154e5120d61b36eb6888ce203e55e0343bc69db4992d0fef56b38c726fe274d1
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
